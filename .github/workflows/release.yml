name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: macos-14  # Apple Silicon

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install libusb
        run: brew install libusb

      - name: Run tests
        run: go test -race ./...

      - name: Build arm64 (Apple Silicon)
        run: |
          GOARCH=arm64 GOOS=darwin CGO_ENABLED=1 \
            go build -ldflags="-X main.version=${{ github.ref_name }}" \
            -o build/droidtether-darwin-arm64 ./cmd/droidtether
          cd build && tar czf droidtether-darwin-arm64.tar.gz droidtether-darwin-arm64

      - name: Build amd64 (Intel)
        run: |
          GOARCH=amd64 GOOS=darwin CGO_ENABLED=1 \
            go build -ldflags="-X main.version=${{ github.ref_name }}" \
            -o build/droidtether-darwin-amd64 ./cmd/droidtether
          cd build && tar czf droidtether-darwin-amd64.tar.gz droidtether-darwin-amd64

      - name: Compute SHA256
        run: |
          shasum -a 256 build/droidtether-darwin-arm64.tar.gz
          shasum -a 256 build/droidtether-darwin-amd64.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/droidtether-darwin-arm64.tar.gz
            build/droidtether-darwin-amd64.tar.gz
          generate_release_notes: true