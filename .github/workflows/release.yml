name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release (Apple Silicon Only)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install libusb
        run: brew install libusb

      - name: Run tests
        run: go test -race ./...

      - name: Build arm64 (Apple Silicon)
        run: |
          mkdir -p build
          GOARCH=arm64 GOOS=darwin CGO_ENABLED=1 \
            go build -ldflags="-X main.version=${{ github.ref_name }}" \
            -o build/droidtether ./cmd/droidtether
          cd build && tar czf droidtether-darwin-arm64.tar.gz droidtether
          shasum -a 256 droidtether-darwin-arm64.tar.gz > droidtether-darwin-arm64.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/droidtether-darwin-arm64.tar.gz
            build/droidtether-darwin-arm64.tar.gz.sha256
          generate_release_notes: true