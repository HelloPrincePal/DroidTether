name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: amd64
            runner: macos-13

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: brew install libusb pkg-config

      - name: Run tests
        run: go test -race ./...

      - name: Build binary
        run: |
          mkdir -p build

          GOARCH=${{ matrix.arch }} GOOS=darwin CGO_ENABLED=1 \
            go build -ldflags="-X main.version=${{ github.ref_name }}" \
            -o build/droidtether ./cmd/droidtether

          tar -C build -czf build/droidtether-darwin-${{ matrix.arch }}.tar.gz droidtether

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: droidtether-${{ matrix.arch }}
          path: build/droidtether-darwin-${{ matrix.arch }}.tar.gz


  release:
    name: Finalize Release
    needs: build
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Generate SHA256 hashes
        id: sha
        run: |
          ARM_HASH=$(shasum -a 256 droidtether-arm64/droidtether-darwin-arm64.tar.gz | cut -d ' ' -f1)
          AMD_HASH=$(shasum -a 256 droidtether-amd64/droidtether-darwin-amd64.tar.gz | cut -d ' ' -f1)

          echo "arm=$ARM_HASH" >> $GITHUB_OUTPUT
          echo "amd=$AMD_HASH" >> $GITHUB_OUTPUT

      - name: Update Homebrew Formula
        run: |
          sed -i '' "0,/REPLACE_WITH_ACTUAL_SHA256_AFTER_RELEASE/s//${{ steps.sha.outputs.arm }}/" Formula/droidtether.rb
          sed -i '' "0,/REPLACE_WITH_ACTUAL_SHA256_AFTER_RELEASE/s//${{ steps.sha.outputs.amd }}/" Formula/droidtether.rb

      - name: Commit updated formula
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add Formula/droidtether.rb
          git commit -m "Update SHA256 (arm64 + amd64) for ${{ github.ref_name }}" || echo "No changes"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            droidtether-arm64/droidtether-darwin-arm64.tar.gz
            droidtether-amd64/droidtether-darwin-amd64.tar.gz
          generate_release_notes: true